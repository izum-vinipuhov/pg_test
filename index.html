<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Hello Test</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      margin: 0;
      padding: 32px;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 28px;
      background: linear-gradient(90deg, #c5b5fd, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    p {
      margin: 6px 0;
      opacity: 0.85;
      font-size: 15px;
    }
    #counter {
      font-size: 20px;
      font-weight: 600;
      margin-top: 16px;
      color: #c5b5fd;
    }
    button {
      margin-top: 20px;
      padding: 10px 22px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 500;
      transition: background 0.15s;
    }
    button:hover { background: #4f46e5; }
    button:active { transform: scale(0.97); }
    .meta {
      margin-top: 24px;
      font-size: 12px;
      opacity: 0.5;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
    }
  </style>
</head>
<body>
  <h1 id="title">Hello, Izum Music!</h1>
  <p id="subtitle">This is a minimal test plugin.</p>
  <p id="counter">Clicks: 0</p>
  <button id="btn">Click me</button>
  <p class="meta" id="meta"></p>

  <script>
    (async () => {
      await MusicPluginAPI.ready()

      const me = MusicPluginAPI.plugin
      document.getElementById('title').textContent =
        'Hello from ' + me.manifest.name
      document.getElementById('meta').textContent =
        me.id + ' · v' + me.version

      let clicks = 0
      const counterEl = document.getElementById('counter')
      document.getElementById('btn').addEventListener('click', () => {
        clicks++
        counterEl.textContent = 'Clicks: ' + clicks
      })
    })()
  </script>
</body>
</html>
